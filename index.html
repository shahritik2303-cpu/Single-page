<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat with Shruu ❤️</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ece5dd;
}

/* Chat container */
.chat {
    max-width: 420px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Header */
.header {
    background: #075e54;
    color: white;
    padding: 15px;
    font-weight: bold;
}

/* Messages */
.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* Bubbles */
.msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14.5px;
    line-height: 1.4;
}

.sent {
    align-self: flex-end;
    background: #dcf8c6;
}

.received {
    align-self: flex-start;
    background: white;
}

/* Image */
.msg img {
    width: 100%;
    border-radius: 10px;
    margin-top: 5px;
}

/* Buttons */
.buttons {
    padding: 10px;
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    font-size: 14px;
}

.yes { background: #25d366; color: white; }
.no { background: #ddd; }

</style>
</head>

<body>

<div class="chat">

    <div class="header">Shruu ❤️</div>

    <div class="messages" id="messages"></div>

    <div class="buttons" id="buttons"></div>

</div>

<script>

const chat = [
    { text: "Hey Shruu… 🥺", type: "sent" },
    { text: "Can I ask you something?", type: "sent" },
    { text: "Did it hurt when I didn’t wait for you?", type: "sent" },
    { text: "Seeing you smile like this… and knowing I was the reason that smile faded that day… it honestly hurts me 💔", type: "sent", img: "photo1.jpg" },
    { text: "Moments like this… being close to you… they mean everything to me. And I hate that I made you feel otherwise 🥺", type: "sent", img: "photo2.jpg" },
    { text: "Because you always wait for me… no matter what… and I didn’t do the same that day.", type: "sent" },
    { text: "But you do matter to me, Shruu. More than I show sometimes ❤️", type: "sent" },
    { text: "I’m really, really sorry… 🥺", type: "sent" },
    { text: "I promise next time, I’ll be the one waiting for you.", type: "sent" },
    { text: "Will you forgive me? 💖", type: "sent", final: true }
];

let i = 0;

function addMessage(data) {
    const msgDiv = document.createElement("div");
    msgDiv.className = "msg " + data.type;
    msgDiv.innerHTML = data.text;

    if (data.img) {
        const img = document.createElement("img");
        img.src = data.img;
        msgDiv.appendChild(img);
    }

    document.getElementById("messages").appendChild(msgDiv);
    msgDiv.scrollIntoView({ behavior: "smooth" });

    if (data.final) showButtons();
}

function showButtons() {
    const btns = document.getElementById("buttons");

    btns.innerHTML = `
        <button class="yes" onclick="forgive()">Yes ❤️</button>
        <button class="no" id="noBtn">No 🙈</button>
    `;

    moveNo();
}

function moveNo() {
    const noBtn = document.getElementById("noBtn");

    function move() {
        const x = Math.random() * 80 - 40;
        const y = Math.random() * 30 - 15;
        noBtn.style.transform = `translate(${x}px, ${y}px)`;
    }

    noBtn.addEventListener("mouseover", move);
    noBtn.addEventListener("touchstart", move);
}

function forgive() {
    document.getElementById("buttons").innerHTML = "";
    addMessage({ text: "YAYYY 😭❤️ Thank you for forgiving me 🥺 I love you", type: "sent" });
}

function startChat() {
    if (i < chat.length) {
        addMessage(chat[i]);
        i++;
        setTimeout(startChat, 1200);
    }
}

startChat();

</script>

</body>
</html>
