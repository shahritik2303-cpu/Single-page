<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ✅ IMPORTANT FOR MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorry Shruu ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
    box-sizing: border-box;
}

/* Card */
.card {
    background: white;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 420px;
    text-align: center;
}

/* Text */
h1 { 
    color: #ff4d6d;
    font-size: 22px;
}

p {
    font-size: 15px;
    min-height: 60px;
    line-height: 1.5;
}

/* Buttons */
button {
    margin: 8px;
    padding: 12px 18px;
    border: none;
    border-radius: 25px;
    font-size: 15px;
    cursor: pointer;
}

.yes { background: #ff4d6d; color: white; }
.no { background: #ccc; position: relative; }

/* Image */
img {
    width: 100%;
    border-radius: 12px;
    margin-top: 12px;
}

/* Hearts */
.heart {
    position: fixed;
    color: rgba(255,255,255,0.7);
    font-size: 18px;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* 📱 Extra small devices */
@media (max-width: 400px) {
    h1 { font-size: 20px; }
    p { font-size: 14px; }
    button { font-size: 14px; padding: 10px 16px; }
}
</style>
</head>

<body>

<!-- 🎵 Optional music -->
<audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h1>Hey Shruu… 🥺</h1>
    <p id="text"></p>
    <div id="buttons"></div>
    <img id="photo" style="display:none;">
</div>

<script>

const steps = [
    {
        text: "Can I ask you something?",
        buttons: `<button class="yes" onclick="nextStep()">Okay</button>`
    },
    {
        text: "Did it hurt when I didn’t wait for you?",
        buttons: `<button class="yes" onclick="nextStep()">Yes…</button>`
    },
    {
        text: "Seeing you smile like this… and knowing I was the reason that smile faded that day… it honestly hurts me 💔",
        buttons: `<button class="yes" onclick="nextStep()">Continue</button>`,
        img: "photo1.jpg"
    },
    {
        text: "Moments like this… being close to you… they mean everything to me. And I hate that I made you feel otherwise 🥺",
        buttons: `<button class="yes" onclick="nextStep()">Hmm…</button>`,
        img: "photo2.jpg"
    },
    {
        text: "Because you always wait for me… no matter what… and I didn’t do the same that day.",
        buttons: `<button class="yes" onclick="nextStep()">...</button>`
    },
    {
        text: "But you do matter to me, Shruu. More than I show sometimes ❤️",
        buttons: `<button class="yes" onclick="nextStep()">Okay…</button>`
    },
    {
        text: "I’m really, really sorry, Shruu… 🥺 I promise next time, I’ll be the one waiting for you.",
        buttons: `<button class="yes" onclick="nextStep()">One last thing?</button>`
    },
    {
        text: "Will you forgive me? 💖",
        buttons: `
            <button class="yes" onclick="forgive()">Yes ❤️</button>
            <button class="no" id="noBtn">No 🙈</button>
        `
    }
];

let step = 0;

function typeText(text, element) {
    element.innerHTML = "";
    let i = 0;
    let interval = setInterval(() => {
        element.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 25);
}

function nextStep() {
    step++;
    loadStep();
}

function loadStep() {
    const data = steps[step];
    const textEl = document.getElementById("text");
    const btnEl = document.getElementById("buttons");
    const imgEl = document.getElementById("photo");

    typeText(data.text, textEl);
    btnEl.innerHTML = data.buttons;

    if (data.img) {
        imgEl.src = data.img;
        imgEl.style.display = "block";
    } else {
        imgEl.style.display = "none";
    }

    if (step === steps.length - 1) {
        setTimeout(moveNoButton, 400);
    }
}

function forgive() {
    document.querySelector(".card").innerHTML = `
        <h1>YAYYY 😭❤️</h1>
        <p>I love you so much, Shruu. Thank you for forgiving me 🥺</p>
    `;
    createHearts();
}

function moveNoButton() {
    const noBtn = document.getElementById("noBtn");

    // mobile-friendly movement
    noBtn.addEventListener("touchstart", move);
    noBtn.addEventListener("mouseover", move);

    function move() {
        const x = Math.random() * 150 - 75;
        const y = Math.random() * 100 - 50;
        noBtn.style.transform = `translate(${x}px, ${y}px)`;
    }
}

function createHearts() {
    for (let i = 0; i < 25; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (3 + Math.random() * 3) + "s";
        document.body.appendChild(heart);
    }
}

// start
loadStep();

</script>

</body>
</html>
