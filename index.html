<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Shruu ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    max-width: 420px;
    text-align: center;
}

h1 { color: #ff4d6d; }

p {
    font-size: 16px;
    min-height: 60px;
}

button {
    margin: 10px;
    padding: 10px 18px;
    border: none;
    border-radius: 20px;
    font-size: 16px;
    cursor: pointer;
}

.yes { background: #ff4d6d; color: white; }
.no { background: #ccc; position: relative; }

img {
    width: 100%;
    border-radius: 15px;
    margin-top: 15px;
}

.heart {
    position: absolute;
    color: rgba(255,255,255,0.7);
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<!-- 🎵 OPTIONAL MUSIC -->
<audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h1 id="title">Hey Shruu… 🥺</h1>
    <p id="text"></p>
    <div id="buttons"></div>
    <img id="photo" style="display:none;">
</div>

<script>

const steps = [
    {
        text: "Can I ask you something?",
        buttons: `<button class="yes" onclick="nextStep()">Okay</button>`
    },
    {
        text: "Did it hurt when I didn’t wait for you?",
        buttons: `<button class="yes" onclick="nextStep()">Yes…</button>`
    },
    {
        text: "I knew it… and that’s what’s been bothering me the most 💔",
        buttons: `<button class="yes" onclick="nextStep()">Continue</button>`,
        img: "photo1.jpg"
    },
    {
        text: "Because you always wait for me… no matter what 🥺",
        buttons: `<button class="yes" onclick="nextStep()">Hmm…</button>`,
        img: "photo2.jpg"
    },
    {
        text: "And I hate that I made you feel like you don’t matter the same way…",
        buttons: `<button class="yes" onclick="nextStep()">...</button>`
    },
    {
        text: "But you do, Shruu. You matter to me more than I show sometimes ❤️",
        buttons: `<button class="yes" onclick="nextStep()">Okay…</button>`
    },
    {
        text: "I’m really, really sorry 🥺 I promise I’ll do better.",
        buttons: `<button class="yes" onclick="nextStep()">Last question?</button>`
    },
    {
        text: "Will you forgive me? 💖",
        buttons: `
            <button class="yes" onclick="forgive()">Yes ❤️</button>
            <button class="no" id="noBtn">No 🙈</button>
        `
    }
];

let step = 0;

function typeText(text, element) {
    element.innerHTML = "";
    let i = 0;
    let interval = setInterval(() => {
        element.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 30);
}

function nextStep() {
    step++;
    loadStep();
}

function loadStep() {
    const data = steps[step];
    const textEl = document.getElementById("text");
    const btnEl = document.getElementById("buttons");
    const imgEl = document.getElementById("photo");

    typeText(data.text, textEl);
    btnEl.innerHTML = data.buttons;

    if (data.img) {
        imgEl.src = data.img;
        imgEl.style.display = "block";
    } else {
        imgEl.style.display = "none";
    }

    if (step === steps.length - 1) {
        setTimeout(moveNoButton, 500);
    }
}

function forgive() {
    document.querySelector(".card").innerHTML = `
        <h1>YAYYY 😭❤️</h1>
        <p>I love you so much, Shruu. Thank you for forgiving me 🥺</p>
    `;
    createHearts();
}

function moveNoButton() {
    const noBtn = document.getElementById("noBtn");

    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * 200 - 100;
        const y = Math.random() * 150 - 75;
        noBtn.style.transform = `translate(${x}px, ${y}px)`;
    });
}

function createHearts() {
    for (let i = 0; i < 25; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (3 + Math.random() * 3) + "s";
        document.body.appendChild(heart);
    }
}

// start
loadStep();

</script>

</body>
</html>
