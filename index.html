<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorry Shruu ❤️</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: #333;
}

/* Container */
.container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* Card */
.card {
    background: white;
    width: 100%;
    max-width: 420px;
    padding: 28px 22px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align: center;
    transition: all 0.3s ease;
}

/* Title */
h1 {
    margin: 0 0 10px;
    font-size: 22px;
    color: #ff4d6d;
}

/* Text */
p {
    font-size: 15.5px;
    line-height: 1.6;
    min-height: 70px;
}

/* Image */
img {
    width: 100%;
    border-radius: 14px;
    margin-top: 14px;
}

/* Buttons */
.buttons {
    margin-top: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    font-size: 15px;
    cursor: pointer;
}

.yes {
    background: #ff4d6d;
    color: white;
}

.no {
    background: #eee;
}

/* Hearts */
.heart {
    position: fixed;
    font-size: 18px;
    color: rgba(255,255,255,0.7);
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="container">
<div class="card">

    <h1>Hey Shruu… 🥺</h1>
    <p id="text"></p>

    <img id="photo" style="display:none;">

    <div class="buttons" id="buttons"></div>

</div>
</div>

<script>

const steps = [
    {
        text: "Can I ask you something?",
        buttons: ["Okay"]
    },
    {
        text: "Did it hurt when I didn’t wait for you?",
        buttons: ["Yes…"]
    },
    {
        text: "Seeing you smile like this… and knowing I was the reason that smile faded that day… it honestly hurts me 💔",
        img: "photo1.jpg",
        buttons: ["Continue"]
    },
    {
        text: "Moments like this… being close to you… they mean everything to me. And I hate that I made you feel otherwise 🥺",
        img: "photo2.jpg",
        buttons: ["Hmm…"]
    },
    {
        text: "Because you always wait for me… no matter what… and I didn’t do the same that day.",
        buttons: ["..."]
    },
    {
        text: "But you do matter to me, Shruu. More than I show sometimes ❤️",
        buttons: ["Okay…"]
    },
    {
        text: "I’m really, really sorry, Shruu… 🥺 I promise next time, I’ll be the one waiting for you.",
        buttons: ["One last thing?"]
    },
    {
        text: "Will you forgive me? 💖",
        buttons: ["Yes ❤️", "No 🙈"]
    }
];

let step = 0;
let typing = false;

function typeText(text) {
    const el = document.getElementById("text");
    el.innerHTML = "";
    let i = 0;
    typing = true;

    function type() {
        if (i < text.length) {
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 25);
        } else {
            typing = false;
        }
    }

    type();
}

function loadStep() {
    const data = steps[step];
    const img = document.getElementById("photo");
    const btnContainer = document.getElementById("buttons");

    typeText(data.text);

    // image
    if (data.img) {
        img.src = data.img;
        img.style.display = "block";
    } else {
        img.style.display = "none";
    }

    // buttons
    btnContainer.innerHTML = "";

    data.buttons.forEach((label, index) => {
        const btn = document.createElement("button");
        btn.innerText = label;

        if (label.includes("Yes")) btn.classList.add("yes");
        if (label.includes("No")) btn.classList.add("no");

        btn.onclick = () => handleClick(label);

        btnContainer.appendChild(btn);
    });

    if (data.buttons.includes("No 🙈")) {
        setTimeout(moveNoButton, 300);
    }
}

function handleClick(label) {
    if (typing) return;

    if (label.includes("Yes") && step === steps.length - 1) {
        forgive();
    } else {
        step++;
        loadStep();
    }
}

function moveNoButton() {
    const noBtn = document.querySelector(".no");

    function move() {
        const x = Math.random() * 120 - 60;
        const y = Math.random() * 80 - 40;
        noBtn.style.transform = `translate(${x}px, ${y}px)`;
    }

    noBtn.addEventListener("touchstart", move);
    noBtn.addEventListener("mouseover", move);
}

function forgive() {
    document.querySelector(".card").innerHTML = `
        <h1>YAYYY 😭❤️</h1>
        <p>I love you so much, Shruu. Thank you for forgiving me 🥺</p>
    `;
    createHearts();
}

function createHearts() {
    for (let i = 0; i < 25; i++) {
        const h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "❤";
        h.style.left = Math.random() * 100 + "vw";
        h.style.animationDuration = (3 + Math.random() * 3) + "s";
        document.body.appendChild(h);
    }
}

loadStep();

</script>

</body>
</html>
